name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - run: bun install --frozen-lockfile
      - run: docker compose up -d --wait
      - run: bun run typecheck
      - run: bun test
      - run: bun audit
      - if: always()
        run: docker compose down -v
