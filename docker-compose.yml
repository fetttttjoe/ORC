services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_PASSWORD: orc
      POSTGRES_DB: orc
    ports:
      - "5433:5432"
    volumes:
      - orc-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 2s
      timeout: 3s
      retries: 30
  surrealdb:
    image: surrealdb/surrealdb:v3.2.0
    command: start --user root --pass orc --bind 0.0.0.0:8000 memory
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD", "/surreal", "isready", "--endpoint", "http://localhost:8000"]
      interval: 2s
      timeout: 3s
      retries: 30
volumes:
  orc-pgdata:
