services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_PASSWORD: orc
      POSTGRES_DB: orc
    ports:
      - "5433:5432"
    volumes:
      - orc-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 2s
      timeout: 3s
      retries: 30
volumes:
  orc-pgdata:
